<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이환 918 스파이더 블라인드 박스 시뮬레이터 v6</title>
    <style>
        /* 기본 스타일 정립 */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            
            --color-spider: #ff4081; /* 핑크 */
            --color-costume: #ffeb3b; /* 노랑 */
            --color-prob: #00ffcc;   /* 확률 강조용 형광 민트 */
            
            --color-paid: #ffeb3b; /* 이상 수정 강조색 (골드/노랑 계열) */
            --color-free: #00e5ff; /* 무료 환석 강조색 (하늘색 계열) */

            --btn-paid-bg: #c0ca33;
            --btn-paid-hover: #9e9d24;
            --btn-free-bg: #00acc1;
            --btn-free-hover: #00838f;
        }

        * { box-sizing: border-box; }

        body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 { text-align: center; color: var(--color-spider); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 28px; }
        .sub-title { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        /* 상단 상태창 */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 25px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-wrap: wrap; gap: 15px; }
        .status-item { text-align: center; flex: 1; }
        .status-label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .status-value { font-size: 20px; font-weight: bold; }
        
        .currency-paid { color: var(--color-paid); }
        .currency-free { color: var(--color-free); }

        /* 뽑기 버튼 그룹 */
        .action-area { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        .btn { flex: 1; max-width: 300px; padding: 15px; font-size: 18px; font-weight: bold; color: #111; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .btn-paid { background-color: var(--btn-paid-bg); }
        .btn-paid:hover { background-color: var(--btn-paid-hover); transform: translateY(-2px); }
        
        .btn-free { background-color: var(--btn-free-bg); color: #fff; }
        .btn-free:hover { background-color: var(--btn-free-hover); transform: translateY(-2px); }
        
        .btn:active { transform: translateY(1px); }
        .btn:disabled { background-color: #555; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        .btn-subtext { font-size: 13px; font-weight: normal; margin-top: 4px; display: block; opacity: 0.9; }

        /* 가챠 박스 그리드 */
        .gacha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }

        .item-card { background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow: hidden; height: 230px; }
        .item-card:not(.faded):hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(255,255,255,0.1); }
        .item-card.spider { border-color: var(--color-spider); box-shadow: 0 0 10px rgba(255, 64, 129, 0.2); }
        .item-card.costume { border-color: var(--color-costume); box-shadow: 0 0 10px rgba(255, 235, 59, 0.2); }

        .item-card.faded { opacity: 0.25; filter: grayscale(100%); border-color: #222 !important; pointer-events: none; }
        .item-card.faded::after { content: '획득 완료'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 24px; font-weight: bold; color: rgba(255, 0, 0, 0.6); border: 4px solid rgba(255, 0, 0, 0.6); padding: 5px 10px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; z-index: 10; }

        .item-visual { font-size: 50px; margin: 10px 0; display: flex; align-items: center; justify-content: center; flex-grow: 1; position: relative; }
        .spider .item-visual::after, .costume .item-visual::after { content: ''; position: absolute; width: 60px; height: 60px; border-radius: 50%; z-index: -1; filter: blur(20px); opacity: 0.5; }
        .spider .item-visual::after { background: var(--color-spider); }
        .costume .item-visual::after { background: var(--color-costume); }

        .item-info { width: 100%; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .item-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; word-break: keep-all; height: 32px; display: flex; align-items: center; justify-content: center; }
        .spider .item-name { color: var(--color-spider); }
        .costume .item-name { color: var(--color-costume); }
        
        .item-prob { font-size: 16px; font-weight: bold; color: var(--color-prob); margin: 5px 0; text-shadow: 0 0 5px rgba(0, 255, 204, 0.3); }
        .item-meta { display: flex; justify-content: center; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* 하단 로그창 */
        .log-container { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
        .log-header { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .log-box { height: 180px; overflow-y: auto; font-size: 13px; color: #ccc; display: flex; flex-direction: column-reverse; }
        .log-entry { margin: 4px 0; padding: 4px 0; border-bottom: 1px solid #1a1a1a; line-height: 1.4; }
        .log-time { color: var(--text-muted); margin-right: 8px; }
        .get-spider { color: var(--color-spider); font-weight: bold; }
        .get-costume { color: var(--color-costume); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* 모바일 최적화 */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 22px; }
            .status-bar { flex-direction: column; gap: 15px; padding: 15px; }
            .status-item { width: 100%; display: flex; justify-content: space-between; align-items: center; text-align: left; }
            .status-label { margin-bottom: 0; font-size: 13px; }
            .status-value { font-size: 16px; text-align: right; }

            .action-area { flex-direction: column; gap: 10px; }
            .btn { max-width: 100%; font-size: 16px; padding: 15px; }

            .gacha-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
            .item-card { height: 195px; padding: 10px; }
            .item-visual { font-size: 40px; }
            .item-name { font-size: 12px; height: 36px; line-height: 1.2; }
            .item-prob { font-size: 15px; }
            .item-meta { font-size: 10px; }
            .item-card.faded::after { font-size: 16px; border-width: 2px; padding: 3px 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>실속 광란 : 한정 캡슐</h1>
        <div class="sub-title">포르쉐 918 스파이더 & 제로 코스튬 「최고의 파트너」</div>
        
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">진행도</span>
                <span class="status-value"><strong id="pullCount">0</strong> / 15</span>
            </div>
            <div class="status-item" style="flex: 2;">
                <span class="status-label">누적 소모량</span>
                <span class="status-value">
                    <span class="currency-paid">이상 수정 <span id="totalPaid">0</span></span> | 
                    <span class="currency-free">무료 환석 <span id="totalFree">0</span></span>
                </span>
            </div>
        </div>

        <div class="action-area">
            <button id="btnPaid" class="btn btn-paid" onclick="draw('paid')">
                이상 수정으로 개봉
                <span class="btn-subtext" id="costPaidText">(- 소모)</span>
            </button>
            <button id="btnFree" class="btn btn-free" onclick="draw('free')">
                무료 환석으로 개봉
                <span class="btn-subtext" id="costFreeText">(- 소모)</span>
            </button>
        </div>

        <div id="gachaGrid" class="gacha-grid">
            </div>

        <div class="log-container">
            <div class="log-header">
                <span>획득 기록 (최신순)</span>
                <button onclick="resetSim()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:11px;">[초기화]</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry"><span class="log-time">[시스템]</span> 시뮬레이터가 준비되었습니다.</div>
            </div>
        </div>
    </div>

    <script>
        const initialPoolData = [
            { id: 1, name: '918 스파이더 (한정)', type: 'spider', initQty: 1, weight: 1, icon: '🏎️' },
            { id: 2, name: '제로 코스튬 「최고의 파트너」', type: 'costume', initQty: 1, weight: 3, icon: '👗' },
            { id: 3, name: '날조의 주사위 * 10', type: 'item', initQty: 1, weight: 5, icon: '🎲' },
            { id: 4, name: '무몽의 과핵 * 10', type: 'item', initQty: 3, weight: 10, icon: '🔮' },
            { id: 5, name: '특급 헌터 공략 * 10', type: 'item', initQty: 4, weight: 50, icon: '📕' },
            { id: 6, name: '갑형 코인 * 100,000', type: 'item', initQty: 5, weight: 100, icon: '💰' }
        ];

        // 유료 환석 = 이상 수정 (백돌, 수치 낮음)
        // 무료 환석 = 흑돌 (수치 높음)
        const pullCosts = [
            { free: 120, paid: 40 },
            { free: 190, paid: 70 },
            { free: 280, paid: 110 },
            { free: 380, paid: 150 },
            { free: 490, paid: 200 },
            { free: 650, paid: 330 },
            { free: 780, paid: 390 },
            { free: 950, paid: 480 },
            { free: 1120, paid: 560 },
            { free: 1290, paid: 650 },
            { free: 1630, paid: 980 },
            { free: 1970, paid: 1180 },
            { free: 2310, paid: 1390 },
            { free: 2650, paid: 1590 },
            { free: 2990, paid: 1790 }
        ];

        let pool = JSON.parse(JSON.stringify(initialPoolData));
        let pullCount = 0;
        let isDrawing = false; 
        
        // 누적 재화 추적용 변수
        let totalPaidSpent = 0;
        let totalFreeSpent = 0;

        const gridEl = document.getElementById('gachaGrid');
        const countEl = document.getElementById('pullCount');
        
        const totalPaidEl = document.getElementById('totalPaid');
        const totalFreeEl = document.getElementById('totalFree');
        
        const btnPaidEl = document.getElementById('btnPaid');
        const btnFreeEl = document.getElementById('btnFree');
        const costPaidText = document.getElementById('costPaidText');
        const costFreeText = document.getElementById('costFreeText');

        const logBoxEl = document.getElementById('logBox');

        function updateUI() {
            countEl.innerText = pullCount;
            totalPaidEl.innerText = totalPaidSpent.toLocaleString();
            totalFreeEl.innerText = totalFreeSpent.toLocaleString();
            
            if (pullCount < 15) {
                const currentCost = pullCosts[pullCount];
                btnPaidEl.disabled = false;
                btnFreeEl.disabled = false;
                costPaidText.innerText = `(${currentCost.paid.toLocaleString()} 소모)`;
                costFreeText.innerText = `(${currentCost.free.toLocaleString()} 소모)`;
            } else {
                btnPaidEl.disabled = true;
                btnFreeEl.disabled = true;
                costPaidText.innerText = `(완료)`;
                costFreeText.innerText = `(완료)`;
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            gridEl.innerHTML = ''; 
            
            pool.forEach(item => {
                let prob = totalWeight > 0 ? ((item.qty * item.weight) / totalWeight * 100) : 0;
                const card = document.createElement('div');
                card.className = `item-card ${item.type}`;
                
                if (item.qty === 0) {
                    card.classList.add('faded');
                }

                card.innerHTML = `
                    <div class="item-visual">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-prob">${prob.toFixed(2)}%</div>
                        <div class="item-meta">
                            <span>남은 수량: <strong>${item.qty}</strong> / ${item.initQty}</span>
                        </div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        // type: 'paid' (이상 수정) or 'free' (무료 환석)
        function draw(type) {
            if (pullCount >= 15 || isDrawing) return;
            
            isDrawing = true;
            btnPaidEl.disabled = true;
            btnFreeEl.disabled = true;

            const costUsed = type === 'paid' ? pullCosts[pullCount].paid : pullCosts[pullCount].free;

            let totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            let rand = Math.random() * totalWeight;
            let cumulativeWeight = 0;
            let wonItem = null;

            for (let i = 0; i < pool.length; i++) {
                if (pool[i].qty > 0) {
                    cumulativeWeight += (pool[i].qty * pool[i].weight);
                    if (rand <= cumulativeWeight) {
                        wonItem = pool[i];
                        wonItem.qty--;
                        break;
                    }
                }
            }

            if (wonItem) {
                // 재화 차감 및 횟수 증가
                if (type === 'paid') totalPaidSpent += costUsed;
                else totalFreeSpent += costUsed;
                
                setTimeout(() => {
                    pullCount++;
                    addLog(wonItem, type, costUsed);
                    updateUI();
                    isDrawing = false;
                }, 400);
            }
        }

        function addLog(item, type, cost) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let nameClass = '';
            if(item.type === 'spider') nameClass = 'get-spider';
            if(item.type === 'costume') nameClass = 'get-costume';

            const costText = type === 'paid' 
                ? `<span class="currency-paid">이상 수정 ${cost.toLocaleString()}</span>` 
                : `<span class="currency-free">무료 환석 ${cost.toLocaleString()}</span>`;

            entry.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                ${pullCount}회차: <span class="${nameClass}">${item.name}</span> 획득 <br>
                <span style="font-size: 11px; color: var(--text-muted); margin-left: 55px;">(사용 재화: ${costText})</span>
            `;
            
            logBoxEl.appendChild(entry);
            logBoxEl.scrollTop = logBoxEl.scrollHeight;
        }

        function resetSim() {
            if(!confirm('모든 진행 상황을 초기화하시겠습니까?')) return;
            pool = JSON.parse(JSON.stringify(initialPoolData));
            pool.forEach(item => item.qty = item.initQty);
            pullCount = 0;
            totalPaidSpent = 0;
            totalFreeSpent = 0;
            logBoxEl.innerHTML = '<div class="log-entry"><span class="log-time">[시스템]</span> 초기화되었습니다.</div>';
            updateUI();
        }

        pool.forEach(item => item.qty = item.initQty);
        updateUI();

    </script>
</body>
</html>
