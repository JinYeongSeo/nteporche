<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이환 918 스파이더 블라인드 박스 시뮬레이터 v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 어반/사이버펑크 스타일 CSS 최적화 */
        :root {
            --bg-base: #0b0b10;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0b0b10 80%);
            --card-bg: rgba(25, 25, 35, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            
            --text-main: #f0f0f0;
            --text-muted: #8a8a9e;
            
            /* 등급 및 재화 컬러 */
            --color-spider: #ff2a6d; /* 네온 핑크 */
            --color-costume: #f9d423; /* 네온 옐로우 */
            --color-item: #05d9e8; /* 네온 시안 */
            --color-prob: #00ffcc; /* 확률 민트 */
            
            --color-paid: #f9d423; /* 이상 수정 */
            --color-free: #05d9e8; /* 무료 환석 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: var(--bg-gradient); 
            background-color: var(--bg-base);
            color: var(--text-main); 
            min-height: 100vh;
            padding: 20px; 
        }

        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 헤더 디자인 */
        .header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .header h1 { color: #fff; font-weight: 900; letter-spacing: 2px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); margin-bottom: 5px; }
        .header .highlight { color: var(--color-spider); }
        .header p { color: var(--text-muted); font-size: 14px; letter-spacing: 1px; }

        /* 글래스모피즘 상태창 */
        .status-dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .status-box { text-align: center; padding: 10px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .status-box.main-total { background: rgba(255, 42, 109, 0.05); border-color: rgba(255, 42, 109, 0.2); }
        
        .status-label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .status-value { font-size: 24px; font-weight: 900; }
        
        .val-spider { color: var(--color-spider); }
        .val-total { font-size: 28px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .val-sub { font-size: 13px; color: var(--text-muted); margin-top: 5px; display: flex; justify-content: center; gap: 10px; }
        
        .currency-paid { color: var(--color-paid); font-weight: 700; }
        .currency-free { color: var(--color-free); font-weight: 700; }

        /* 뽑기 액션 영역 */
        .action-area { display: flex; gap: 15px; justify-content: center; margin-bottom: 35px; }
        .btn { 
            flex: 1; max-width: 350px; padding: 18px 20px; font-size: 18px; font-weight: 900; 
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; color: #000;
        }
        
        .btn-paid { background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%); box-shadow: 0 4px 15px rgba(249, 212, 35, 0.3); }
        .btn-free { background: linear-gradient(135deg, #05d9e8 0%, #0182b5 100%); box-shadow: 0 4px 15px rgba(5, 217, 232, 0.3); color: #fff; }
        
        .btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { background: #2a2a35; color: #555; cursor: not-allowed; box-shadow: none; }

        .btn-subtext { font-size: 13px; font-weight: 700; margin-top: 5px; display: block; opacity: 0.85; }

        /* 가챠 박스 그리드 */
        .gacha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 35px; }

        .item-card { 
            background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(5px); 
            border: 1px solid var(--card-border); border-radius: 14px; 
            padding: 15px; text-align: center; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; position: relative; 
            transition: all 0.3s ease; height: 230px; 
        }
        
        .item-card:not(.faded):hover { transform: translateY(-5px); background: rgba(30, 30, 45, 0.9); border-color: rgba(255,255,255,0.3); }
        
        /* 등급별 네온 글로우 */
        .item-card.spider { border: 1px solid var(--color-spider); box-shadow: inset 0 0 20px rgba(255, 42, 109, 0.1), 0 0 10px rgba(255, 42, 109, 0.2); }
        .item-card.costume { border: 1px solid var(--color-costume); box-shadow: inset 0 0 20px rgba(249, 212, 35, 0.1), 0 0 10px rgba(249, 212, 35, 0.2); }

        .item-card.faded { opacity: 0.3; filter: grayscale(100%); border-color: #222 !important; pointer-events: none; }
        .item-card.faded::after { 
            content: 'SOLD OUT'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); 
            font-size: 22px; font-weight: 900; color: #ff2a6d; border: 3px solid #ff2a6d; 
            padding: 5px 15px; border-radius: 4px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,42,109,0.5); box-shadow: 0 0 10px rgba(255,42,109,0.2) inset; z-index: 10; 
        }

        .item-visual { font-size: 55px; margin: 10px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .spider .item-visual::after { content: ''; position: absolute; width: 70px; height: 70px; border-radius: 50%; background: var(--color-spider); filter: blur(25px); opacity: 0.4; z-index: -1; }
        .costume .item-visual::after { content: ''; position: absolute; width: 70px; height: 70px; border-radius: 50%; background: var(--color-costume); filter: blur(25px); opacity: 0.4; z-index: -1; }

        .item-info { width: 100%; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .item-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; word-break: keep-all; height: 36px; display: flex; align-items: center; justify-content: center; line-height: 1.3; }
        .spider .item-name { color: var(--color-spider); text-shadow: 0 0 8px rgba(255,42,109,0.4); }
        .costume .item-name { color: var(--color-costume); text-shadow: 0 0 8px rgba(249,212,35,0.4); }
        
        .item-prob { font-size: 18px; font-weight: 900; color: var(--color-prob); margin: 5px 0; text-shadow: 0 0 8px rgba(0, 255, 204, 0.4); }
        .item-meta { font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 20px; display: inline-block; }

        /* 터미널 스타일 로그창 */
        .log-container { background: #050508; padding: 20px; border-radius: 14px; border: 1px solid #1f1f2e; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .log-header { font-size: 13px; color: var(--color-item); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #1f1f2e; display: flex; justify-content: space-between; font-weight: 700; letter-spacing: 1px; }
        .btn-reset { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; transition: 0.2s; }
        .btn-reset:hover { background: rgba(255,42,109,0.2); color: #fff; border-color: #ff2a6d; }
        
        .log-box { height: 180px; overflow-y: auto; font-size: 13px; color: #b4b4c7; display: flex; flex-direction: column-reverse; font-family: 'Courier New', Courier, monospace; }
        .log-entry { margin: 2px 0; padding: 6px 10px; border-radius: 4px; border-left: 2px solid transparent; }
        .log-entry:hover { background: rgba(255,255,255,0.02); border-left-color: var(--color-item); }
        .log-time { color: #55556e; margin-right: 8px; font-size: 12px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-item); }

        /* 모바일 최적화 반응형 */
        @media (max-width: 768px) {
            .status-dashboard { grid-template-columns: 1fr; gap: 10px; padding: 15px; }
            .action-area { flex-direction: column; gap: 12px; }
            .btn { max-width: 100%; font-size: 16px; padding: 16px; }
            .gacha-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .item-card { height: 210px; padding: 10px; }
            .item-visual { font-size: 45px; }
            .item-name { font-size: 11px; height: 32px; }
            .item-prob { font-size: 16px; }
            .header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="highlight">918 SPYDER</span> BLIND BOX</h1>
            <p>이환(NTE) 실속 광란 한정 캡슐 시뮬레이터</p>
        </div>
        
        <div class="status-dashboard">
            <div class="status-box">
                <span class="status-label">진행도</span>
                <span class="status-value val-spider"><span id="pullCount">0</span> <span style="font-size: 16px; color: #888;">/ 15</span></span>
            </div>
            
            <div class="status-box main-total">
                <span class="status-label" style="color: #fff;">전체 소모 환석 (Total)</span>
                <span class="status-value val-total" id="totalCombined">0</span>
                <div class="val-sub">
                    <span><span class="currency-paid">수정</span> <span id="totalPaid">0</span></span>
                    <span>|</span>
                    <span><span class="currency-free">무료</span> <span id="totalFree">0</span></span>
                </div>
            </div>

            <div class="status-box">
                <span class="status-label">다음 필요 재화</span>
                <span class="status-value" style="font-size: 16px; display: flex; flex-direction: column; gap: 4px; margin-top: 5px;">
                    <span id="nextPaid" class="currency-paid">-</span>
                    <span id="nextFree" class="currency-free">-</span>
                </span>
            </div>
        </div>

        <div class="action-area">
            <button id="btnPaid" class="btn btn-paid" onclick="draw('paid')">
                이상 수정으로 개봉
                <span class="btn-subtext" id="costPaidText">대기 중</span>
            </button>
            <button id="btnFree" class="btn btn-free" onclick="draw('free')">
                무료 환석으로 개봉
                <span class="btn-subtext" id="costFreeText">대기 중</span>
            </button>
        </div>

        <div id="gachaGrid" class="gacha-grid">
            </div>

        <div class="log-container">
            <div class="log-header">
                <span>> TERMINAL_LOG : REWARD_HISTORY</span>
                <button class="btn-reset" onclick="resetSim()">[ 시스템 초기화 ]</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry"><span class="log-time">[00:00:00]</span> SYSTEM: 시뮬레이터 구동 완료. 개봉을 시작하십시오.</div>
            </div>
        </div>
    </div>

    <script>
        const initialPoolData = [
            { id: 1, name: '918 스파이더 (한정)', type: 'spider', initQty: 1, weight: 1, icon: '🏎️' },
            { id: 2, name: '최고의 파트너 (코스튬)', type: 'costume', initQty: 1, weight: 3, icon: '👗' },
            { id: 3, name: '날조의 주사위 * 10', type: 'item', initQty: 1, weight: 5, icon: '🎲' },
            { id: 4, name: '무몽의 과핵 * 10', type: 'item', initQty: 3, weight: 10, icon: '🔮' },
            { id: 5, name: '특급 헌터 공략 * 10', type: 'item', initQty: 4, weight: 50, icon: '📕' },
            { id: 6, name: '갑형 코인 * 100,000', type: 'item', initQty: 5, weight: 100, icon: '💰' }
        ];

        const pullCosts = [
            { free: 120, paid: 40 },
            { free: 190, paid: 70 },
            { free: 280, paid: 110 },
            { free: 380, paid: 150 },
            { free: 490, paid: 200 },
            { free: 650, paid: 330 },
            { free: 780, paid: 390 },
            { free: 950, paid: 480 },
            { free: 1120, paid: 560 },
            { free: 1290, paid: 650 },
            { free: 1630, paid: 980 },
            { free: 1970, paid: 1180 },
            { free: 2310, paid: 1390 },
            { free: 2650, paid: 1590 },
            { free: 2990, paid: 1790 }
        ];

        let pool = JSON.parse(JSON.stringify(initialPoolData));
        let pullCount = 0;
        let isDrawing = false; 
        
        let totalPaidSpent = 0;
        let totalFreeSpent = 0;

        const gridEl = document.getElementById('gachaGrid');
        const countEl = document.getElementById('pullCount');
        
        const totalCombinedEl = document.getElementById('totalCombined');
        const totalPaidEl = document.getElementById('totalPaid');
        const totalFreeEl = document.getElementById('totalFree');
        
        const nextPaidEl = document.getElementById('nextPaid');
        const nextFreeEl = document.getElementById('nextFree');

        const btnPaidEl = document.getElementById('btnPaid');
        const btnFreeEl = document.getElementById('btnFree');
        const costPaidText = document.getElementById('costPaidText');
        const costFreeText = document.getElementById('costFreeText');

        const logBoxEl = document.getElementById('logBox');

        function updateUI() {
            countEl.innerText = pullCount;
            
            // 누적 렌더링
            totalPaidEl.innerText = totalPaidSpent.toLocaleString();
            totalFreeEl.innerText = totalFreeSpent.toLocaleString();
            totalCombinedEl.innerText = (totalPaidSpent + totalFreeSpent).toLocaleString();
            
            if (pullCount < 15) {
                const currentCost = pullCosts[pullCount];
                
                nextPaidEl.innerText = `수정 ${currentCost.paid.toLocaleString()}개`;
                nextFreeEl.innerText = `무료 ${currentCost.free.toLocaleString()}개`;

                btnPaidEl.disabled = false;
                btnFreeEl.disabled = false;
                costPaidText.innerText = `(- ${currentCost.paid.toLocaleString()} 소모)`;
                costFreeText.innerText = `(- ${currentCost.free.toLocaleString()} 소모)`;
            } else {
                nextPaidEl.innerText = `-`;
                nextFreeEl.innerText = `-`;

                btnPaidEl.disabled = true;
                btnFreeEl.disabled = true;
                costPaidText.innerText = `(모든 보상 획득)`;
                costFreeText.innerText = `(모든 보상 획득)`;
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            gridEl.innerHTML = ''; 
            
            pool.forEach(item => {
                let prob = totalWeight > 0 ? ((item.qty * item.weight) / totalWeight * 100) : 0;
                const card = document.createElement('div');
                card.className = `item-card ${item.type}`;
                
                if (item.qty === 0) {
                    card.classList.add('faded');
                }

                card.innerHTML = `
                    <div class="item-visual">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-prob">${prob.toFixed(2)}%</div>
                        <div class="item-meta">남은 수량: ${item.qty} / ${item.initQty}</div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        function draw(type) {
            if (pullCount >= 15 || isDrawing) return;
            
            isDrawing = true;
            btnPaidEl.disabled = true;
            btnFreeEl.disabled = true;

            const costUsed = type === 'paid' ? pullCosts[pullCount].paid : pullCosts[pullCount].free;

            let totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            let rand = Math.random() * totalWeight;
            let cumulativeWeight = 0;
            let wonItem = null;

            for (let i = 0; i < pool.length; i++) {
                if (pool[i].qty > 0) {
                    cumulativeWeight += (pool[i].qty * pool[i].weight);
                    if (rand <= cumulativeWeight) {
                        wonItem = pool[i];
                        wonItem.qty--;
                        break;
                    }
                }
            }

            if (wonItem) {
                if (type === 'paid') totalPaidSpent += costUsed;
                else totalFreeSpent += costUsed;
                
                setTimeout(() => {
                    pullCount++;
                    addLog(wonItem, type, costUsed);
                    updateUI();
                    isDrawing = false;
                }, 300); // 딜레이 약간 줄임
            }
        }

        function addLog(item, type, cost) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let nameClass = '';
            let itemNameStr = item.name;
            if(item.type === 'spider') { nameClass = 'val-spider'; itemNameStr = `[★★★★★] ${item.name}`; }
            else if(item.type === 'costume') { nameClass = 'currency-paid'; itemNameStr = `[★★★★] ${item.name}`; }

            const costText = type === 'paid' 
                ? `<span class="currency-paid">이상 수정 -${cost.toLocaleString()}</span>` 
                : `<span class="currency-free">무료 환석 -${cost.toLocaleString()}</span>`;

            entry.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                <span style="color: #fff;">${String(pullCount).padStart(2, '0')}회차:</span> 
                <span class="${nameClass}" style="font-weight: 700;">${itemNameStr}</span> 획득 
                <span style="font-size: 11px; margin-left: 10px;">(${costText})</span>
            `;
            
            logBoxEl.appendChild(entry);
            logBoxEl.scrollTop = logBoxEl.scrollHeight;
        }

        function resetSim() {
            if(!confirm('모든 데이터를 초기화하시겠습니까?')) return;
            pool = JSON.parse(JSON.stringify(initialPoolData));
            pool.forEach(item => item.qty = item.initQty);
            pullCount = 0;
            totalPaidSpent = 0;
            totalFreeSpent = 0;
            logBoxEl.innerHTML = '<div class="log-entry"><span class="log-time">[00:00:00]</span> SYSTEM: 데이터가 초기화되었습니다.</div>';
            updateUI();
        }

        // 초기화 실행
        pool.forEach(item => item.qty = item.initQty);
        updateUI();

    </script>
</body>
</html>
