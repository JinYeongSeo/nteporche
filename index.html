<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이환 918 스파이더 블라인드 박스 시뮬레이터 v11 (전 회차 가중치 정상화)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 네온 어반 스타일 테마 */
        :root {
            --bg-base: #0b0b10;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0b0b10 80%);
            --card-bg: rgba(25, 25, 35, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            
            --text-main: #f0f0f0;
            --text-muted: #8a8a9e;
            
            --color-spider: #ff2a6d;
            --color-costume: #f9d423;
            --color-item: #05d9e8;
            --color-prob: #00ffcc;
            
            --color-hwanseok: #ff9100;
            --color-ponds: #00e5ff;
            
            --btn-hwanseok-bg: #ff9100;
            --btn-ponds-bg: #00acc1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: var(--bg-gradient); 
            background-color: var(--bg-base);
            color: var(--text-main); 
            min-height: 100vh;
            padding: 20px; 
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        .header h1 { color: #fff; font-weight: 900; letter-spacing: 2px; font-size: 32px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); margin-bottom: 5px; }
        .header .highlight { color: var(--color-spider); }
        .header p { color: var(--text-muted); font-size: 14px; letter-spacing: 1px; }

        .status-dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .status-box { text-align: center; padding: 10px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center; }
        .status-box.main-total { background: rgba(5, 217, 232, 0.02); border-color: rgba(5, 217, 232, 0.15); }
        
        .status-label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .status-value { font-size: 24px; font-weight: 900; }
        
        .val-spider { color: var(--color-spider); }
        .val-total-split { font-size: 20px; color: #fff; display: flex; justify-content: center; gap: 20px; font-weight: 900; }
        
        .currency-hwanseok { color: var(--color-hwanseok); }
        .currency-ponds { color: var(--color-ponds); }

        .action-area { display: flex; gap: 15px; justify-content: center; margin-bottom: 35px; }
        .btn { 
            flex: 1; max-width: 350px; padding: 18px 20px; font-size: 18px; font-weight: 900; 
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden; color: #000;
        }
        
        .btn-hwanseok { background: linear-gradient(135deg, #ffb300 0%, #ff6f00 100%); box-shadow: 0 4px 15px rgba(255, 145, 0, 0.3); color: #fff; }
        .btn-ponds { background: linear-gradient(135deg, #00e5ff 0%, #00838f 100%); box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); color: #fff; }
        
        .btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { background: #2a2a35; color: #555; cursor: not-allowed; box-shadow: none; transform: none; filter: none; }
        .btn-subtext { font-size: 13px; font-weight: 700; margin-top: 5px; display: block; opacity: 0.9; }

        .gacha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-bottom: 35px; }

        .item-card { 
            background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(5px); 
            border: 1px solid var(--card-border); border-radius: 14px; 
            padding: 15px 10px; text-align: center; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; position: relative; 
            transition: all 0.3s ease; height: 215px; 
        }
        
        .item-card:not(.faded):hover { transform: translateY(-5px); background: rgba(30, 30, 45, 0.9); border-color: rgba(255,255,255,0.3); }
        
        .item-card.spider { border: 1px solid var(--color-spider); box-shadow: inset 0 0 20px rgba(255, 42, 109, 0.1), 0 0 10px rgba(255, 42, 109, 0.2); }
        .item-card.costume { border: 1px solid var(--color-costume); box-shadow: inset 0 0 20px rgba(249, 212, 35, 0.1), 0 0 10px rgba(249, 212, 35, 0.2); }

        .item-card.faded { opacity: 0.2; filter: grayscale(100%); border-color: #222 !important; pointer-events: none; }
        .item-card.faded::after { 
            content: 'SOLD OUT'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); 
            font-size: 18px; font-weight: 900; color: #ff2a6d; border: 3px solid #ff2a6d; 
            padding: 5px 10px; border-radius: 4px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,42,109,0.5); box-shadow: 0 0 10px rgba(255,42,109,0.2) inset; z-index: 10; 
        }

        .item-visual { font-size: 40px; margin: 5px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .spider .item-visual::after, .costume .item-visual::after { content: ''; position: absolute; width: 60px; height: 60px; border-radius: 50%; filter: blur(25px); opacity: 0.4; z-index: -1; }
        .spider .item-visual::after { background: var(--color-spider); }
        .costume .item-visual::after { background: var(--color-costume); }

        .item-info { width: 100%; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .item-name { font-size: 12px; font-weight: 700; margin-bottom: 3px; word-break: keep-all; height: 32px; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
        .spider .item-name { color: var(--color-spider); text-shadow: 0 0 8px rgba(255,42,109,0.4); }
        .costume .item-name { color: var(--color-costume); text-shadow: 0 0 8px rgba(249,212,35,0.4); }
        
        .item-prob { font-size: 16px; font-weight: 900; color: var(--color-prob); margin: 3px 0; text-shadow: 0 0 8px rgba(0, 255, 204, 0.4); }
        .item-meta { font-size: 10px; color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 20px; display: inline-block; }

        .log-container { background: #050508; padding: 20px; border-radius: 14px; border: 1px solid #1f1f2e; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .log-header { font-size: 13px; color: var(--color-item); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #1f1f2e; display: flex; justify-content: space-between; font-weight: 700; letter-spacing: 1px; }
        .btn-reset { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 4px 10px; border-radius: 4px; transition: 0.2s; }
        .btn-reset:hover { background: rgba(255,42,109,0.2); color: #fff; border-color: #ff2a6d; }
        
        .log-box { height: 180px; overflow-y: auto; font-size: 13px; color: #b4b4c7; display: flex; flex-direction: column-reverse; font-family: 'Courier New', Courier, monospace; }
        .log-entry { margin: 2px 0; padding: 6px 10px; border-radius: 4px; border-left: 2px solid transparent; }
        .log-entry:hover { background: rgba(255,255,255,0.02); border-left-color: var(--color-item); }
        .log-time { color: #55556e; margin-right: 8px; font-size: 12px; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-item); }

        @media (max-width: 768px) {
            .status-dashboard { grid-template-columns: 1fr; gap: 10px; padding: 15px; }
            .action-area { flex-direction: column; gap: 12px; }
            .btn { max-width: 100%; font-size: 16px; padding: 16px; }
            .gacha-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .item-card { height: 195px; padding: 10px; }
            .item-visual { font-size: 36px; }
            .item-name { font-size: 11px; height: 32px; }
            .item-prob { font-size: 15px; }
            .header h1 { font-size: 24px; }
            .val-total-split { font-size: 16px; flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="highlight">918 SPYDER</span> BLIND BOX</h1>
            <p>이환(NTE) 실속 광란 한정 캡슐 시뮬레이터</p>
        </div>
        
        <div class="status-dashboard">
            <div class="status-box">
                <span class="status-label">진행도</span>
                <span class="status-value val-spider"><span id="pullCount">0</span> <span style="font-size: 16px; color: #888;">/ 15</span></span>
            </div>
            
            <div class="status-box main-total">
                <span class="status-label">누적 소모량 (Total Spent)</span>
                <div class="val-total-split">
                    <div><span class="currency-hwanseok">환석:</span> <span id="totalHwanseok">0</span>개</div>
                    <div><span class="currency-ponds">폰즈:</span> <span id="totalPonds">0</span>만</div>
                </div>
            </div>

            <div class="status-box">
                <span class="status-label">다음 필요 재화</span>
                <span class="status-value" style="font-size: 15px; display: flex; flex-direction: column; gap: 4px;">
                    <span id="nextHwanseok" class="currency-hwanseok">-</span>
                    <span id="nextPonds" class="currency-ponds">-</span>
                </span>
            </div>
        </div>

        <div class="action-area">
            <button id="btnHwanseok" class="btn btn-hwanseok" onclick="draw('hwanseok')">
                환석으로 개봉
                <span class="btn-subtext" id="costHwanseokText">대기 중</span>
            </button>
            <button id="btnPonds" class="btn btn-ponds" onclick="draw('ponds')">
                폰즈로 개봉
                <span class="btn-subtext" id="costPondsText">대기 중</span>
            </button>
        </div>

        <div id="gachaGrid" class="gacha-grid">
            </div>

        <div class="log-container">
            <div class="log-header">
                <span>> TERMINAL_LOG : REWARD_HISTORY</span>
                <button class="btn-reset" onclick="resetSim()">[ 시스템 초기화 ]</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry"><span class="log-time">[00:00:00]</span> SYSTEM: 시뮬레이터 구동 완료. 개봉 재화를 선택하십시오.</div>
            </div>
        </div>
    </div>

    <script>
        // 유출 데이터 원본 바탕 풀 구성 (총 13종류, 수량 합계 15개)
        const initialPoolData = [
            { id: 1, name: '918 스파이더', type: 'spider', initQty: 1, baseWeight: 1, icon: '🏎️' },
            { id: 2, name: '최고의 파트너 코스튬', type: 'costume', initQty: 1, baseWeight: 3, icon: '👗' },
            { id: 3, name: '기만의 주사위 * 10', type: 'item', initQty: 1, baseWeight: 5, icon: '🎲' },
            { id: 4, name: '자필 편지 1통', type: 'item', initQty: 1, baseWeight: 10, icon: '✉️' },
            { id: 5, name: '폰즈 50만', type: 'item', initQty: 1, baseWeight: 10, icon: '💳' },
            { id: 6, name: '트랙 스케치/사진', type: 'item', initQty: 1, baseWeight: 50, icon: '🖼️' },
            { id: 7, name: '설레는 순간', type: 'item', initQty: 1, baseWeight: 50, icon: '✨' },
            { id: 8, name: '기만의 주사위 * 3', type: 'item', initQty: 1, baseWeight: 100, icon: '🎲' },
            { id: 9, name: '유빙 그림', type: 'item', initQty: 1, baseWeight: 100, icon: '🧊' },
            { id: 10, name: '폰즈 10만', type: 'item', initQty: 1, baseWeight: 100, icon: '💳' },
            { id: 11, name: '특급 헌터 가이드 * 10', type: 'item', initQty: 2, baseWeight: 200, icon: '📕' },
            { id: 12, name: '꿈 없는 씨앗 * 10', type: 'item', initQty: 1, baseWeight: 100, icon: '🌱' },
            { id: 13, name: '비틀코인 10만', type: 'item', initQty: 2, baseWeight: 200, icon: '🪙' }
        ];

        const pullCosts = [
            { hwanseok: 50, ponds: 5 },
            { hwanseok: 80, ponds: 8 },
            { hwanseok: 100, ponds: 10 },
            { hwanseok: 150, ponds: 20 },
            { hwanseok: 200, ponds: 30 },
            { hwanseok: 300, ponds: 50 },
            { hwanseok: 500, ponds: 80 },
            { hwanseok: 800, ponds: 100 },
            { hwanseok: 1000, ponds: 150 },
            { hwanseok: 1200, ponds: 200 },
            { hwanseok: 1600, ponds: 300 },
            { hwanseok: 1800, ponds: 350 },
            { hwanseok: 2000, ponds: 400 },
            { hwanseok: 2200, ponds: 450 },
            { hwanseok: 2400, ponds: 500 }
        ];

        let pool = JSON.parse(JSON.stringify(initialPoolData));
        let pullCount = 0;
        let isDrawing = false; 
        
        let totalHwanseokSpent = 0;
        let totalPondsSpent = 0;

        const gridEl = document.getElementById('gachaGrid');
        const countEl = document.getElementById('pullCount');
        
        const totalHwanseokEl = document.getElementById('totalHwanseok');
        const totalPondsEl = document.getElementById('totalPonds');
        
        const nextHwanseokEl = document.getElementById('nextHwanseok');
        const nextPondsEl = document.getElementById('nextPonds');

        const btnHwanseokEl = document.getElementById('btnHwanseok');
        const btnPondsEl = document.getElementById('btnPonds');
        const costHwanseokText = document.getElementById('costHwanseokText');
        const costPondsText = document.getElementById('costPondsText');

        const logBoxEl = document.getElementById('logBox');

        // 가중치 업데이트 로직 (1~5뽑 0% 제한 제거하고 기본 가중치로 롤백)
        function refreshWeights() {
            pool.forEach(item => {
                item.weight = item.baseWeight;
            });
        }

        function updateUI() {
            countEl.innerText = pullCount;
            
            totalHwanseokEl.innerText = totalHwanseokSpent.toLocaleString();
            totalPondsEl.innerText = totalPondsSpent.toLocaleString();
            
            if (pullCount < 15) {
                const currentCost = pullCosts[pullCount];
                
                nextHwanseokEl.innerText = `환석 ${currentCost.hwanseok.toLocaleString()}개`;
                nextPondsEl.innerText = `폰즈 ${currentCost.ponds.toLocaleString()}만`;

                btnHwanseokEl.disabled = false;
                btnPondsEl.disabled = false;
                costHwanseokText.innerText = `(- ${currentCost.hwanseok.toLocaleString()}개)`;
                costPondsText.innerText = `(- ${currentCost.ponds.toLocaleString()}만)`;
            } else {
                nextHwanseokEl.innerText = `-`;
                nextPondsEl.innerText = `-`;

                btnHwanseokEl.disabled = true;
                btnPondsEl.disabled = true;
                costHwanseokText.innerText = `(모든 보상 획득)`;
                costPondsText.innerText = `(모든 보상 획득)`;
            }

            refreshWeights();

            const totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            gridEl.innerHTML = ''; 
            
            pool.forEach(item => {
                let prob = totalWeight > 0 ? ((item.qty * item.weight) / totalWeight * 100) : 0;
                const card = document.createElement('div');
                card.className = `item-card ${item.type}`;
                
                if (item.qty === 0) {
                    card.classList.add('faded');
                }

                card.innerHTML = `
                    <div class="item-visual">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-prob">${prob.toFixed(2)}%</div>
                        <div class="item-meta">남은 수량: ${item.qty} / ${item.initQty}</div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        function draw(type) {
            if (pullCount >= 15 || isDrawing) return;
            
            isDrawing = true;
            btnHwanseokEl.disabled = true;
            btnPondsEl.disabled = true;

            const costUsed = type === 'hwanseok' ? pullCosts[pullCount].hwanseok : pullCosts[pullCount].ponds;

            refreshWeights();
            
            let totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            let rand = Math.random() * totalWeight;
            let cumulativeWeight = 0;
            let wonItem = null;

            for (let i = 0; i < pool.length; i++) {
                if (pool[i].qty > 0 && pool[i].weight > 0) {
                    cumulativeWeight += (pool[i].qty * pool[i].weight);
                    if (rand <= cumulativeWeight) {
                        wonItem = pool[i];
                        wonItem.qty--;
                        break;
                    }
                }
            }

            if (wonItem) {
                if (type === 'hwanseok') totalHwanseokSpent += costUsed;
                else totalPondsSpent += costUsed;
                
                setTimeout(() => {
                    pullCount++;
                    addLog(wonItem, type, costUsed);
                    updateUI();
                    isDrawing = false;
                }, 300);
            }
        }

        function addLog(item, type, cost) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let nameClass = '';
            let itemNameStr = item.name;
            if(item.type === 'spider') { nameClass = 'val-spider'; itemNameStr = `[★★★★★] ${item.name}`; }
            else if(item.type === 'costume') { nameClass = 'currency-hwanseok'; itemNameStr = `[★★★★] ${item.name}`; }

            const costText = type === 'hwanseok' 
                ? `<span class="currency-hwanseok">환석 -${cost.toLocaleString()}개</span>` 
                : `<span class="currency-ponds">폰즈 -${cost.toLocaleString()}만</span>`;

            entry.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                <span style="color: #fff;">${String(pullCount).padStart(2, '0')}회차:</span> 
                <span class="${nameClass}" style="font-weight: 700;">${itemNameStr}</span> 획득 
                <span style="font-size: 11px; margin-left: 10px;">(${costText})</span>
            `;
            
            logBoxEl.appendChild(entry);
            logBoxEl.scrollTop = logBoxEl.scrollHeight;
        }

        function resetSim() {
            if(!confirm('모든 데이터를 초기화하시겠습니까?')) return;
            pool = JSON.parse(JSON.stringify(initialPoolData));
            pool.forEach(item => item.qty = item.initQty);
            pullCount = 0;
            totalHwanseokSpent = 0;
            totalPondsSpent = 0;
            logBoxEl.innerHTML = '<div class="log-entry"><span class="log-time">[00:00:00]</span> SYSTEM: 데이터가 초기화되었습니다.</div>';
            updateUI();
        }

        pool.forEach(item => item.qty = item.initQty);
        updateUI();
    </script>
</body>
</html>
