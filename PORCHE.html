<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이환 918 스파이더 블라인드 박스 시뮬레이터 v3</title>
    <style>
        /* 기본 스타일 정립 */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            
            --color-spider: #ff4081; /* 핑크 */
            --color-costume: #ffeb3b; /* 노랑 */
            --color-item: #00e5ff;   /* 하늘색 */
            
            --btn-color: #e91e63;
            --btn-hover: #c2185b;
        }

        * { box-sizing: border-box; }

        body { font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h1 { text-align: center; color: var(--color-costume); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-size: 28px; }
        .sub-title { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        /* 상단 상태창 */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 25px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-item { text-align: center; }
        .status-label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .status-value { font-size: 20px; font-weight: bold; }
        #costDisplay { color: var(--color-costume); }

        /* 뽑기 버튼 */
        .btn { display: block; width: 100%; max-width: 300px; margin: 0 auto 30px auto; padding: 18px; font-size: 18px; font-weight: bold; background-color: var(--btn-color); color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3); text-transform: uppercase; }
        .btn:hover { background-color: var(--btn-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { background-color: #555; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        /* 가챠 박스 그리드 */
        .gacha-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }

        /* 아이템 카드 기본 스타일 */
        .item-card { background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow: hidden; height: 220px; }

        .item-card:not(.faded):hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(255,255,255,0.1); }

        .item-card.spider { border-color: var(--color-spider); box-shadow: 0 0 10px rgba(255, 64, 129, 0.2); }
        .item-card.costume { border-color: var(--color-costume); box-shadow: 0 0 10px rgba(255, 235, 59, 0.2); }

        /* 흐려짐 효과 & 스탬프 */
        .item-card.faded { opacity: 0.25; filter: grayscale(100%); border-color: #222 !important; pointer-events: none; }
        .item-card.faded::after { content: '획득 완료'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 24px; font-weight: bold; color: rgba(255, 0, 0, 0.6); border: 4px solid rgba(255, 0, 0, 0.6); padding: 5px 10px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; z-index: 10; }

        .item-visual { font-size: 50px; margin: 10px 0; display: flex; align-items: center; justify-content: center; flex-grow: 1; position: relative; }
        .spider .item-visual::after, .costume .item-visual::after { content: ''; position: absolute; width: 60px; height: 60px; border-radius: 50%; z-index: -1; filter: blur(20px); opacity: 0.5; }
        .spider .item-visual::after { background: var(--color-spider); }
        .costume .item-visual::after { background: var(--color-costume); }

        .item-info { width: 100%; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .item-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; word-break: keep-all; height: 32px; display: flex; align-items: center; justify-content: center; }
        
        .spider .item-name { color: var(--color-spider); }
        .costume .item-name { color: var(--color-costume); }
        
        .item-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        /* 하단 로그창 */
        .log-container { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
        .log-header { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; }
        .log-box { height: 150px; overflow-y: auto; font-size: 13px; color: #ccc; display: flex; flex-direction: column-reverse; }
        .log-entry { margin: 4px 0; padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
        .log-time { color: var(--text-muted); margin-right: 8px; }
        .get-spider { color: var(--color-spider); font-weight: bold; }
        .get-costume { color: var(--color-costume); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* ★★★ 모바일 최적화 (Media Query) ★★★ */
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 22px; }
            .sub-title { font-size: 12px; margin-bottom: 20px; }
            
            /* 상태창을 세로로 정렬하고 가독성 높임 */
            .status-bar { flex-direction: column; gap: 12px; padding: 15px; }
            .status-item { width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .status-label { margin-bottom: 0; font-size: 13px; }
            .status-value { font-size: 18px; }

            /* 가챠 박스를 모바일에서 무조건 2열 고정 */
            .gacha-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
            
            /* 박스 크기 및 폰트 축소 */
            .item-card { height: 180px; padding: 10px; }
            .item-visual { font-size: 40px; }
            .item-name { font-size: 12px; height: 36px; line-height: 1.2; }
            
            /* 확률 텍스트가 겹치지 않게 세로 배열 */
            .item-meta { flex-direction: column; gap: 4px; align-items: center; font-size: 10px; }
            
            /* 스탬프 크기 조절 */
            .item-card.faded::after { font-size: 16px; border-width: 2px; padding: 3px 6px; }

            /* 버튼 크기 및 여백 조절 */
            .btn { max-width: 100%; font-size: 16px; padding: 15px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>실속 광란 : 한정 캡슐</h1>
        <div class="sub-title">포르쉐 918 스파이더 & 제로 코스튬 「최고의 파트너」</div>
        
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">진행도</span>
                <span class="status-value"><strong id="pullCount">0</strong> / 15</span>
            </div>
            <div class="status-item">
                <span class="status-label">다음 소모 재화 (이클/폰스)</span>
                <span class="status-value" id="costDisplay">100</span>
            </div>
        </div>

        <button id="pullBtn" class="btn" onclick="draw()">블라인드 박스 개봉</button>

        <div id="gachaGrid" class="gacha-grid">
            </div>

        <div class="log-container">
            <div class="log-header">
                <span>획득 기록 (최신순)</span>
                <button onclick="resetSim()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:11px;">[초기화]</button>
            </div>
            <div class="log-box" id="logBox">
                <div class="log-entry"><span class="log-time">[시스템]</span> 시뮬레이터가 준비되었습니다.</div>
            </div>
        </div>
    </div>

    <script>
        const initialPoolData = [
            { id: 1, name: '918 스파이더 (한정)', type: 'spider', initQty: 1, weight: 1, icon: '🏎️' },
            { id: 2, name: '제로 코스튬 「최고의 파트너」', type: 'costume', initQty: 1, weight: 3, icon: '👗' },
            { id: 3, name: '날조의 주사위 * 10', type: 'item', initQty: 1, weight: 5, icon: '🎲' },
            { id: 4, name: '무몽의 과핵 * 10', type: 'item', initQty: 3, weight: 10, icon: '🔮' },
            { id: 5, name: '특급 헌터 공략 * 10', type: 'item', initQty: 4, weight: 50, icon: '📕' },
            { id: 6, name: '갑형 코인 * 100,000', type: 'item', initQty: 5, weight: 100, icon: '💰' }
        ];

        let pool = JSON.parse(JSON.stringify(initialPoolData));
        const costs = [100, 200, 300, 500, 800, 1200, 1700, 2300, 3000, 3800, 4700, 5700, 6800, 8000, 9500];
        let pullCount = 0;
        let isDrawing = false; 

        const gridEl = document.getElementById('gachaGrid');
        const costEl = document.getElementById('costDisplay');
        const countEl = document.getElementById('pullCount');
        const btnEl = document.getElementById('pullBtn');
        const logBoxEl = document.getElementById('logBox');

        function updateUI() {
            countEl.innerText = pullCount;
            
            if (pullCount < 15) {
                costEl.innerText = costs[pullCount].toLocaleString();
                btnEl.disabled = false;
                btnEl.innerText = `블라인드 박스 개봉`;
            } else {
                costEl.innerText = '0';
                btnEl.disabled = true;
                btnEl.innerText = '완료 (모든 보상 획득)';
            }

            const totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            gridEl.innerHTML = ''; 
            
            pool.forEach(item => {
                let prob = totalWeight > 0 ? ((item.qty * item.weight) / totalWeight * 100) : 0;
                const card = document.createElement('div');
                card.className = `item-card ${item.type}`;
                
                if (item.qty === 0) {
                    card.classList.add('faded');
                }

                card.innerHTML = `
                    <div class="item-visual">${item.icon}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">
                            <span>수량: <strong>${item.qty}</strong>/${item.initQty}</span>
                            <span>${prob.toFixed(2)}%</span>
                        </div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        function draw() {
            if (pullCount >= 15 || isDrawing) return;
            
            isDrawing = true;
            btnEl.disabled = true;
            btnEl.innerText = "개봉 중...";

            let totalWeight = pool.reduce((sum, item) => sum + (item.qty * item.weight), 0);
            let rand = Math.random() * totalWeight;
            let cumulativeWeight = 0;
            let wonItem = null;

            for (let i = 0; i < pool.length; i++) {
                if (pool[i].qty > 0) {
                    cumulativeWeight += (pool[i].qty * pool[i].weight);
                    if (rand <= cumulativeWeight) {
                        wonItem = pool[i];
                        wonItem.qty--;
                        break;
                    }
                }
            }

            if (wonItem) {
                setTimeout(() => {
                    pullCount++;
                    addLog(wonItem);
                    updateUI();
                    isDrawing = false;
                }, 500);
            }
        }

        function addLog(item) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let nameClass = '';
            if(item.type === 'spider') nameClass = 'get-spider';
            if(item.type === 'costume') nameClass = 'get-costume';

            entry.innerHTML = `
                <span class="log-time">[${timeStr}]</span>
                ${pullCount}회차: <span class="${nameClass}">${item.name}</span> 획득 (소모:${costs[pullCount-1].toLocaleString()})
            `;
            
            logBoxEl.appendChild(entry);
            logBoxEl.scrollTop = logBoxEl.scrollHeight;
        }

        function resetSim() {
            if(!confirm('모든 진행 상황을 초기화하시겠습니까?')) return;
            pool = JSON.parse(JSON.stringify(initialPoolData));
            pool.forEach(item => item.qty = item.initQty);
            pullCount = 0;
            logBoxEl.innerHTML = '<div class="log-entry"><span class="log-time">[시스템]</span> 초기화되었습니다.</div>';
            updateUI();
        }

        pool.forEach(item => item.qty = item.initQty);
        updateUI();

    </script>
</body>
</html>
